<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ORACLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --oracle:#00ff88;
  --oracle-rgb:0,255,136;
  --pulse:1;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:monospace;
}

canvas{ position:absolute; inset:0; }

#oracleWrap{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  z-index:3;
}

#oracle{
  width:100%;
  filter: drop-shadow(0 0 calc(20px * var(--pulse)) rgba(var(--oracle-rgb),0.5));
  transition: filter 0.1s linear;
}

#oracleGlow{
  position:absolute;
  top:50%;
  left:50%;
  width:450px;
  height:650px;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(var(--oracle-rgb), calc(0.25 * var(--pulse))) 0%, transparent 70%);
  filter:blur(30px);
  z-index:2;
}

#ui{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:800px;
}

#panel{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  backdrop-filter:blur(10px);
}

button{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

</style>
</head>

<body class="idle">

<canvas id="matrix"></canvas>
<div id="oracleGlow"></div>

<div id="oracleWrap">
  <video id="oracle" autoplay muted loop playsinline src="oracle-idle.webm"></video>
</div>

<div id="ui">
  <div id="panel">
    <div id="heard">Awaiting input</div>
    <div id="response">...</div>
    <button onclick="startListening()">LISTEN</button>
  </div>
</div>

<script>
const responseEl = document.getElementById("response");
const heardEl = document.getElementById("heard");

let speaking = false;
let pulse = 1;
let pulseTarget = 1;

// ==========================
// 🎤 VOICE
// ==========================
function speakOracle(text){
  const u = new SpeechSynthesisUtterance(text);

  u.rate = 0.88;
  u.pitch = 0.9;
  u.volume = 1;

  speaking = true;

  u.onstart = () => {
    document.body.className = "speaking";
    animateVoice();
  };

  u.onend = () => {
    speaking = false;
    document.body.className = "idle";
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ==========================
// 🎯 FAKE AUDIO REACTIVE PULSE
// ==========================
function animateVoice(){
  function loop(){
    if(!speaking) return;

    pulseTarget = 1 + Math.random() * 0.8;

    document.documentElement.style.setProperty("--pulse", pulseTarget);

    requestAnimationFrame(loop);
  }
  loop();
}

// ==========================
// 🧠 BACKEND CALL
// ==========================
async function askOracle(query){
  responseEl.innerText = "Consulting local intelligence...";
  document.body.className = "thinking";

  try{
    const res = await fetch("http://127.0.0.1:5000/ask", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ query })
    });

    const data = await res.json();
    const reply = data.response || "No response.";

    responseEl.innerText = reply;
    speakOracle(reply);

  }catch(err){
    responseEl.innerText = "Bridge error.";
    document.body.className = "alert";
  }
}

// ==========================
// 🎤 SPEECH RECOGNITION
// ==========================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    heardEl.innerText = text;
    askOracle(text);
  };
}

function startListening(){
  if(recognition){
    recognition.start();
    document.body.className = "listening";
  }
}

// ==========================
// 🟩 MATRIX BACKGROUND
// ==========================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for(let i=0;i<columns;i++) drops[i]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#0f0";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw,33);

</script>
</body>
</html>
