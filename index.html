<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ORACLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  overflow:hidden;
}

/* ORACLE */
#oracleWrap{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:min(40vw, 450px);
}

#oracle{
  width:100%;
  opacity:1;
  transition:0.3s;
}

/* THINKING ORB */
#orb{
  position:absolute;
  top:50%;
  left:50%;
  width:140px;
  height:140px;
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  background:radial-gradient(circle, #00ff88, transparent 70%);
  opacity:0;
  transition:0.3s;
}

/* STATES */
.thinking #oracle{ opacity:0; }
.thinking #orb{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%,100%{ transform:translate(-50%,-50%) scale(1); }
  50%{ transform:translate(-50%,-50%) scale(1.2); }
}

/* UI */
#ui{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:700px;
  text-align:center;
}

#heard{ opacity:0.7; margin-bottom:10px; }
#response{ font-size:18px; }

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  background:#00ff88;
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="oracleWrap">
  <video id="oracle" autoplay muted loop playsinline src="oracle-idle.webm"></video>
  <div id="orb"></div>
</div>

<div id="ui">
  <div id="heard">Awaiting input...</div>
  <div id="response">Press LISTEN</div>
  <button onclick="startListening()">LISTEN</button>
</div>

<script>
const body = document.body;
const heard = document.getElementById("heard");
const responseEl = document.getElementById("response");

function setThinking(on){
  if(on) body.classList.add("thinking");
  else body.classList.remove("thinking");
}

/* VOICE */
function getVoice(){
  const voices = speechSynthesis.getVoices();

  return voices.find(v =>
    /zira|aria|jenny|samantha|female/i.test(v.name)
  ) || voices[0];
}

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getVoice();
  u.rate = 0.85;
  u.pitch = 0.85;

  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* ASK ORACLE */
async function askOracle(query){
  setThinking(true);
  responseEl.innerText = "Thinking...";

  try{
    const res = await fetch("http://127.0.0.1:5000/ask", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query})
    });

    const data = await res.json();

    setThinking(false);

    responseEl.innerText = data.response || "No response";
    speak(data.response);

  }catch(e){
    setThinking(false);
    responseEl.innerText = "Bridge failure";
  }
}

/* SPEECH INPUT */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog;

if(SpeechRecognition){
  recog = new SpeechRecognition();
  recog.lang = "en-US";

  recog.onresult = e=>{
    const text = e.results[0][0].transcript;
    heard.innerText = text;
    askOracle(text);
  };
}

function startListening(){
  if(recog){
    recog.start();
  }
}
</script>

</body>
</html>
