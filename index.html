<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ORACLE</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family: monospace;
}

/* MATRIX */
canvas {
  position:absolute;
  top:0;
  left:0;
}

/* ORACLE SPRITE */
#oracle {
  position:absolute;
  top:50%;
  left:50%;
  width:350px;
  height:500px;
  transform:translate(-50%,-50%);
  background-image:url("oracle-sprite.png");
  background-size: 300% 200%;
  background-repeat:no-repeat;
  mix-blend-mode:screen;
  opacity:.9;

  animation: float 6s ease-in-out infinite;
}

/* FLOATING */
@keyframes float {
  0%,100% { transform: translate(-50%,-50%) translateY(0px); }
  50% { transform: translate(-50%,-50%) translateY(-20px); }
}

/* GLOW PULSE */
@keyframes pulse {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.4); }
}

/* UI */
#ui {
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
}

#status {
  opacity:.7;
}

#response {
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="oracle"></div>

<div id="ui">
  <div id="status">IDLE</div>
  <div id="response">Press SPACE</div>
</div>

<script>
const oracle = document.getElementById("oracle");
const status = document.getElementById("status");
const response = document.getElementById("response");

/* SPRITE POSITIONS */
const states = {
  idle: "0% 0%",
  thinking: "50% 0%",
  speaking: "100% 0%",
  intro: "0% 100%",
  outro: "100% 100%"
};

function setState(s, text){
  status.innerText = s.toUpperCase();
  if(text) response.innerText = text;

  oracle.style.backgroundPosition = states[s];

  if(s==="speaking"){
    oracle.style.animation = "float 6s ease-in-out infinite, pulse 1.5s infinite";
  } else {
    oracle.style.animation = "float 6s ease-in-out infinite";
  }
}

/* VOICE */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){
  const rec = new SpeechRecognition();

  function listen(){
    setState("thinking","Listening...");
    rec.start();
  }

  rec.onresult = e=>{
    let text = e.results[0][0].transcript;

    setState("thinking", text);

    setTimeout(()=>{
      setState("speaking","Processing...");
    },1000);

    setTimeout(()=>{
      setState("idle","Ready.");
    },3000);
  };

  document.addEventListener("keydown", e=>{
    if(e.code==="Space") listen();
  });
}

/* MATRIX */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let letters = "01";
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw, 33);

/* START */
setState("intro","Initializing...");

setTimeout(()=>{
  setState("idle","Ready.");
},2000);

</script>

</body>
</html>
