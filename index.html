<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ORACLE // PRESENCE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family: monospace;
}

/* UI */
#ui {
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
}

#status {
  font-size:14px;
  opacity:.7;
  letter-spacing:2px;
}

#response {
  margin-top:8px;
  font-size:16px;
}

#title {
  position:absolute;
  top:20px;
  left:20px;
  opacity:.6;
  font-size:12px;
}

/* mood colors */
.idle {color:#00aaff;}
.listening {color:#66c2ff;}
.thinking {color:#ffd500;}
.executing {color:#00ff88;}
.alert {color:#ff0040;}
.speaking {color:#ffffff;}
.deep {color:#a86dff;}

canvas {
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body class="idle">

<canvas id="canvas"></canvas>

<div id="title">ORACLE // ACTIVE</div>

<div id="ui">
  <div id="status">IDLE</div>
  <div id="response">Say the word.</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let W = canvas.width;
let H = canvas.height;

let state = "idle";

const colors = {
  idle:"#00aaff",
  listening:"#66c2ff",
  thinking:"#ffd500",
  executing:"#00ff88",
  alert:"#ff0040",
  speaking:"#ffffff",
  deep:"#a86dff"
};

const glyphs = "01アカサタナハマヤラABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = Math.floor(W / fontSize);
const rain = Array(columns).fill(0);

let particles = [];
const particleCount = 600;

for(let i=0;i<particleCount;i++){
  particles.push({
    x:Math.random()*W,
    y:Math.random()*H,
    vx:0,
    vy:0
  });
}

function drawRain() {
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = colors[state];
  ctx.font = fontSize+"px monospace";

  for(let i=0;i<rain.length;i++){
    let x = i*fontSize;
    let y = rain[i]*fontSize;

    let char = glyphs[Math.floor(Math.random()*glyphs.length)];

    ctx.fillText(char,x,y);

    if(y>H && Math.random()>0.98) rain[i]=0;
    rain[i]++;
  }
}

function silhouette(x,y){
  let cx = W/2;
  let cy = H/2;

  let nx = (x-cx)/200;
  let ny = (y-cy)/200;

  let head = 1 - (nx*nx + (ny+.3)*(ny+.3)*2);
  let shoulders = 1 - ((nx*nx)/1.5 + (ny-.3)*(ny-.3)*4);

  return Math.max(head,shoulders,0);
}

function updateParticles(){
  let cx = W/2;
  let cy = H/2;

  particles.forEach(p=>{
    let dx = cx - p.x;
    let dy = cy - p.y;

    let dist = Math.sqrt(dx*dx+dy*dy) || 1;

    let attract = 0.002;

    if(state==="executing") attract = 0.006;
    if(state==="thinking") attract = 0.003;
    if(state==="idle") attract = 0.0005;

    p.vx += dx/dist * attract;
    p.vy += dy/dist * attract;

    let s = silhouette(p.x,p.y);

    if(s>0){
      p.vx += (Math.random()-.5)*0.02;
      p.vy -= s*0.05;
    }

    if(state==="executing"){
      // anime hair flow
      if(p.y < cy-40){
        p.vx += Math.sin(p.y*.05)*0.2;
      }
    }

    if(state==="alert"){
      p.vx += (Math.random()-.5)*0.5;
      p.vy += (Math.random()-.5)*0.5;
    }

    p.vx *= .95;
    p.vy *= .95;

    p.x += p.vx;
    p.y += p.vy;

    ctx.beginPath();
    ctx.fillStyle = colors[state];
    ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fill();
  });
}

function draw(){
  drawRain();
  updateParticles();
  requestAnimationFrame(draw);
}

draw();

/* UI */

function setState(s, text){
  state = s;
  document.body.className = s;
  document.getElementById("status").innerText = s.toUpperCase();
  if(text) document.getElementById("response").innerText = text;
}

/* keyboard testing */

document.addEventListener("keydown", e=>{
  if(e.key==="1") setState("idle","Say the word.");
  if(e.key==="2") setState("listening","I am listening.");
  if(e.key==="3") setState("thinking","Analyzing.");
  if(e.key==="4") setState("executing","Directive accepted.");
  if(e.key==="5") setState("alert","Something is wrong.");
  if(e.key==="6") setState("speaking","Responding.");
  if(e.key==="7") setState("deep","Entering deeper state.");
});

/* backend hook */

window.oracleUpdate = function(data){
  setState(data.mood || "idle", data.response || "");
};

window.addEventListener("resize",()=>{
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  W = canvas.width;
  H = canvas.height;
});
</script>

</body>
</html>
