<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ORACLE</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family: monospace;
}

canvas {
  position:absolute;
  top:0;
  left:0;
}

#ui {
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
}

#status {
  opacity:.7;
  font-size:14px;
  letter-spacing:2px;
}

#response {
  margin-top:10px;
  font-size:18px;
}

#title {
  position:absolute;
  top:20px;
  left:20px;
  opacity:.6;
  font-size:12px;
}

/* colors */
.idle {color:#00aaff;}
.listening {color:#66c2ff;}
.thinking {color:#ffd500;}
.executing {color:#00ff88;}
.alert {color:#ff0040;}
.speaking {color:#ffffff;}
.deep {color:#a86dff;}
</style>
</head>

<body class="idle">

<canvas id="canvas"></canvas>

<div id="title">ORACLE // ACTIVE</div>

<div id="ui">
  <div id="status">IDLE</div>
  <div id="response">Press SPACE to speak</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W = canvas.width = innerWidth;
let H = canvas.height = innerHeight;

let state = "idle";

const colors = {
  idle:"#00aaff",
  listening:"#66c2ff",
  thinking:"#ffd500",
  executing:"#00ff88",
  alert:"#ff0040",
  speaking:"#ffffff",
  deep:"#a86dff"
};

const glyphs = "01アカサタナハマヤラABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = Math.floor(W / fontSize);
const rain = Array(columns).fill(0);

let particles = [];
for(let i=0;i<500;i++){
  particles.push({
    x:Math.random()*W,
    y:Math.random()*H,
    vx:0,
    vy:0
  });
}

function setState(s,text){
  state = s;
  document.body.className = s;
  document.getElementById("status").innerText = s.toUpperCase();
  if(text) document.getElementById("response").innerText = text;
}

/* SPEECH OUTPUT */
function speak(text){
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.95;
  utterance.pitch = 1;
  speechSynthesis.speak(utterance);
}

/* MATRIX */
function drawRain(){
  ctx.fillStyle="rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle=colors[state];
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<rain.length;i++){
    let x=i*fontSize;
    let y=rain[i]*fontSize;
    let char=glyphs[Math.floor(Math.random()*glyphs.length)];

    ctx.fillText(char,x,y);

    if(y>H && Math.random()>0.98) rain[i]=0;
    rain[i]++;
  }
}

/* AVATAR */
function silhouette(x,y){
  let cx=W/2;
  let cy=H/2;

  let nx=(x-cx)/200;
  let ny=(y-cy)/200;

  let head=1-(nx*nx+(ny+.3)*(ny+.3)*2);
  let shoulders=1-((nx*nx)/1.5+(ny-.3)*(ny-.3)*4);

  return Math.max(head,shoulders,0);
}

function updateParticles(){
  let cx=W/2;
  let cy=H/2;

  particles.forEach(p=>{
    let dx=cx-p.x;
    let dy=cy-p.y;
    let dist=Math.sqrt(dx*dx+dy*dy)||1;

    let attract=0.002;
    if(state==="executing") attract=0.006;
    if(state==="thinking") attract=0.003;
    if(state==="idle") attract=0.0005;

    p.vx+=dx/dist*attract;
    p.vy+=dy/dist*attract;

    let s=silhouette(p.x,p.y);

    if(s>0){
      p.vy-=s*0.05;
    }

    p.vx*=.95;
    p.vy*=.95;

    p.x+=p.vx;
    p.y+=p.vy;

    ctx.beginPath();
    ctx.fillStyle=colors[state];
    ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fill();
  });
}

function draw(){
  drawRain();
  updateParticles();
  requestAnimationFrame(draw);
}
draw();

/* BRAIN */
function respond(text){
  text=text.toLowerCase();

  if(text.includes("hello")) return "I'm here.";
  if(text.includes("help")) return "Tell me what you need.";
  if(text.includes("plan")) return "Start with the highest leverage move.";
  if(text.includes("focus")) return "Remove distractions and commit.";
  
  return "Say that again.";
}

/* VOICE INPUT */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){
  const recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.lang = "en-US";

  function listen(){
    setState("listening","Listening...");
    recognition.start();
  }

  recognition.onresult = function(e){
    let text = e.results[0][0].transcript;

    setState("thinking",text);

    setTimeout(()=>{
      let reply = respond(text);
      setState("speaking",reply);
      speak(reply); // 🔥 THIS IS NEW
    },800);
  };

  recognition.onerror = function(){
    setState("alert","Voice error");
  };

  document.addEventListener("keydown",e=>{
    if(e.code==="Space"){
      listen();
    }
  });
}

window.addEventListener("resize",()=>{
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
});
</script>

</body>
</html>
