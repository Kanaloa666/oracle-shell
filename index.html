<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ORACLE</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:monospace;
}

/* MATRIX */
canvas{
  position:absolute;
  top:0;
  left:0;
}

/* ORACLE VIDEO */
#oracle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  pointer-events:none;
  mix-blend-mode:screen;

  animation: float 6s ease-in-out infinite;
  filter:
    drop-shadow(0 0 15px rgba(0,255,136,0.4))
    drop-shadow(0 0 40px rgba(0,255,136,0.2));
}

/* FLOATING */
@keyframes float{
  0%,100% { transform: translate(-50%,-50%) translateY(0px); }
  50% { transform: translate(-50%,-50%) translateY(-18px); }
}

/* UI */
#ui{
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
}

#status{
  opacity:.7;
  letter-spacing:2px;
}

#response{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<video id="oracle" autoplay muted playsinline></video>

<div id="ui">
  <div id="status">INITIALIZING</div>
  <div id="response">Standby...</div>
</div>

<script>
const video = document.getElementById("oracle");
const status = document.getElementById("status");
const response = document.getElementById("response");

/* VIDEO SYSTEM */
const clips = {
  intro: "oracle-intro.webm",
  idle: "oracle-idle.webm"
};

let current = "intro";

/* PLAY CLIP */
function playClip(name, loop=true){
  video.src = clips[name];
  video.loop = loop;
  video.play();
  current = name;
}

/* INTRO FIRST */
playClip("intro", false);

video.onended = () => {
  if(current === "intro"){
    playClip("idle", true);
    setState("idle","Oracle online.");
  }
};

/* STATE SYSTEM */
function setState(s, text){
  status.innerText = s.toUpperCase();
  if(text) response.innerText = text;
}

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let letters = "01";
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw,33);
</script>

</body>
</html>
